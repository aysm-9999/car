<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>car</title>
    <style>
        body {
            background: linear-gradient(45deg, rgb(185, 3, 73, white, rgb(115, 172, 211)))
        }

        .k {

            height: 25em;
            transform-origin: left;
            transform: scaleX(0);
            background-color: aqua;


        }

        .head {


            top: 0%;
        }

        .text {

            color: blue;
            font-size: 500%;
            position: relative;
            top: 1em;
            left: 1em;

            opacity: 0;

        }

        .car {
            position: relative;
            height: 25em;
            width: 60em;
            /* background-color: brown; */
            top: -25em;
            opacity: 1;

        }



        .wheel1 {
            position: relative;

            height: 10em;
            width: 10em;
            background-color: rgb(5, 5, 5);
            top: -10em;
            left: 15em;
            border-radius: 50%;

            border: 5px solid white;



        }

        .car,
        .wheel1,
        .wheel2 {
            will-change: transform;
        }

        .wheel2 {
            position: relative;
            height: 10em;
            width: 10em;
            background-color: rgb(8, 8, 8);
            top: -20em;

            left: 43em;
            border-radius: 50%;

            border: 5px solid white;


        }

        .car1 {
            position: relative;
            top: 40%;
            left: 15%;
            height: 50%;
            width: 80%;
            background-color: rgb(3, 3, 3);

            border-radius: 20% 70% 7% 7%;
            overflow: hidden;
            border: 2px solid black;
        }

        .roof {
            position: relative;
            height: 54%;
            width: 55%;
            clip-path: polygon(8% 35%,
                    4% 55%,
                    2% 85%,
                    60% 90%,
                    90% 92%, 80% 65%,
                    70% 50%,
                    55% 42%,
                    35% 30%, 15% 20%);
            background-color: rgb(3, 3, 3);
            left: 27%;
            top: -50%;
        }

        .window {
            position: relative;
            height: 54%;
            width: 55%;
            clip-path: polygon(8% 35%,
                    4% 55%,
                    2% 85%,
                    60% 90%,
                    90% 92%, 80% 65%,
                    70% 50%,
                    55% 42%,
                    35% 30%, 15% 20%);
            background-color: rgb(255, 255, 255);
            left: 35%;
            top: 35%;

        }

        .window2 {
            position: relative;
            height: 62%;
            width: 20%;
            clip-path: polygon(80% 10%,
                    95% 20%,
                    85% 60%,
                    75% 85%,
                    40% 95%,
                    10% 95%,
                    5% 60%,
                    8% 30%);
            background-color: rgb(245, 239, 239);
            left: 15%;
            top: -25%;
            border-radius: 5;
            transform: rotate(200deg);

        }

        .w1 {
            position: relative;
            height: 60%;
            width: 60%;
            border-radius: 50%;
            background-color: beige;
            top: 20%;
            left: 20%;

        }

        .l1 {
            position: relative;
            height: 50%;
            width: 20%;
            clip-path: polygon(50% 0%,
                    0% 100%,
                    100% 100%);
            background-color: black;
            left: 45%;
            top: 50%;

        }

        .l2 {
            position: relative;
            height: 50%;
            width: 20%;
            clip-path: polygon(50% 0%,
                    0% 100%,
                    100% 100%);
            background-color: black;
            left: 65%;
            top: -35%;
            transform: rotate(230deg);

        }

        .l3 {
            position: relative;
            height: 50%;
            width: 20%;
            clip-path: polygon(50% 0%,
                    0% 100%,
                    100% 100%);
            background-color: black;
            top: -90%;
            left: 20%;


            transform: rotate(490deg);

        }

        .he1 {
            position: relative;
            height: 20%;
            width: 15%;
            border-radius: 70%;
            background-color: rgb(234, 245, 250);
            transform: rotate(17deg);
            left: 40em;
            top: 4em;
            border: 3px solid black;
        }

        .he2 {
            position: relative;

            height: 20%;
            width: 5%;
            border-radius: 5%;
            background-color: brown;
            top: -20em;
        }

        .po {
            height: 20em;
            width: 20em;
            background-color: blueviolet;
            border-radius: 30%;
            border: 5px solid white;
            box-shadow: inset;
            opacity: 0;
        }







        /* Car Body */
    </style>
</head>

<body>
    <div class="head">
        <div class="k">
            <div class="text">W E L C O M E I T Z F I Z Z</div>
        </div>
        <div class="car">
            <div class="car1">
                <div class="he1"></div>
                <div class="he2"></div>
            </div>
            <div class="roof">
                <div class="window"></div>
                <div class="window2"></div>
            </div>


            <div class="wheel1">
                <div class="w1">
                    <div class="l1"></div>
                    <div class="l2"></div>
                    <div class="l3"></div>
                </div>
            </div>
            <div class="wheel2">
                <div class="w1">
                    <div class="l1"></div>
                    <div class="l2"></div>
                    <div class="l3"></div>

                </div>
            </div>
        </div>
    </div>



    </div>
    <div class="po">pop up </div>
    <div class="pop1">

    </div>

        let tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".head",
                start: "top top",
                end: "+=1500",
                scrub: 1,
                pin: true
            }
        });


        /* Car moves across screen */
        tl.to(".car", {
            x: "120vw",
            ease: "none",
            opacity: "0.6"
        }, 0);


        /* Wheels rotate */
        tl.to(".wheel1, .wheel2", {
            rotation: 1440,
            ease: "none"
        }, 0);
        tl.to(".k", {
            scaleX: 1,
            ease: "none"
        }, 0);
        tl.to(".text", {
            opacity: 1,

            ease: "none"
        }, 0);
        tl.add("exitPoint", 0.5)
        tl.to(".po", {
            opacity: 1,
            y: "-200%",
            x: "40%",

            ease: "none"
        }, 0);
